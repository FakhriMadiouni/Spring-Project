<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <h4 class="mb-0">✍️ Gestion des Auteurs</h4>
      <button class="btn btn-success btn-sm" (click)="showForm = !showForm">
        {{ showForm ? '✕ Annuler' : '+ Nouvel Auteur' }}
      </button>
    </div>

    <div class="card-body">
      @if(showForm) {
        <div class="card mb-3 border-success">
          <div class="card-body">
            <h6>Ajouter un auteur :</h6>
            <div class="row">
              <div class="col-md-5 mb-2">
                <input type="text" class="form-control"
                       [(ngModel)]="newAuteur.nomAuteur" placeholder="Nom de l'auteur">
              </div>
              <div class="col-md-5 mb-2">
                <input type="text" class="form-control"
                       [(ngModel)]="newAuteur.nationalite" placeholder="Nationalité">
              </div>
              <div class="col-md-2 mb-2">
                <button class="btn btn-success w-100" (click)="ajouterAuteur()">
                  💾 Sauver
                </button>
              </div>
            </div>
          </div>
        </div>
      }

      <table class="table table-striped table-hover">
        <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Nom de l'Auteur</th>
            <th>Nationalité</th>
          </tr>
        </thead>
        <tbody>
          @for (auteur of auteurs; track auteur.idAuteur) {
            <tr>
              <td>{{ auteur.idAuteur }}</td>
              <td><strong>{{ auteur.nomAuteur }}</strong></td>
              <td>{{ auteur.nationalite }}</td>
            </tr>
          }
          @empty {
            <tr>
              <td colspan="3" class="text-center text-muted">Aucun auteur trouvé.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <div class="card-footer text-muted">
      Total : {{ auteurs.length }} auteur(s)
    </div>
  </div>
</div>
