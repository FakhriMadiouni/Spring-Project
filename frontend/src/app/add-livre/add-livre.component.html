<div class="container mt-4">
  <div class="card shadow">
    <div class="card-header bg-success text-white">
      <h4 class="mb-0">➕ Ajouter un Livre</h4>
    </div>
    <div class="card-body">
      <form>
        <div class="row mb-3">
          <div class="col-md-8">
            <label class="form-label">Titre du Livre *</label>
            <input type="text" class="form-control"
                   [(ngModel)]="newLivre.titreLivre" name="titreLivre"
                   placeholder="Ex: Les Misérables">
          </div>
          <div class="col-md-4">
            <label class="form-label">Prix (DT) *</label>
            <input type="number" class="form-control"
                   [(ngModel)]="newLivre.prixLivre" name="prixLivre"
                   placeholder="Ex: 25.99">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Date de Publication</label>
            <input type="date" class="form-control"
                   [(ngModel)]="newLivre.datePublication" name="datePublication">
          </div>
          <div class="col-md-6">
            <label class="form-label">Auteur *</label>
            <select class="form-select" [(ngModel)]="selectedAuteurId" name="auteurId">
              <option value="" disabled selected>-- Choisir un auteur --</option>
              @for (auteur of auteurs; track auteur.idAuteur) {
                <option [value]="auteur.idAuteur">{{ auteur.nomAuteur }}</option>
              }
            </select>
          </div>
        </div>

        <div class="d-flex gap-2">
          <button type="button" class="btn btn-success" (click)="addLivre()">
            💾 Enregistrer
          </button>
          <a class="btn btn-secondary" routerLink="/livres">Annuler</a>
        </div>
      </form>
    </div>
  </div>
</div>
